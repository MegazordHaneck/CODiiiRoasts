version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - export CI=1
        - echo "AWS_BRANCH=$AWS_BRANCH AWS_APP_ID=$AWS_APP_ID"
        - |
          if [ -z "$AWS_BRANCH" ] || [ -z "$AWS_APP_ID" ]; then
            echo "ERROR: AWS_BRANCH and AWS_APP_ID must be set by Amplify Hosting"
            exit 1
          fi
        - npx ampx pipeline-deploy --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID"
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        - |
          if [ -n "$AWS_BRANCH" ] && [ -n "$AWS_APP_ID" ]; then
            npx ampx generate outputs --branch "$AWS_BRANCH" --app-id "$AWS_APP_ID"
            cp amplify_outputs.json public/amplify_outputs.json
          else
            echo "Skipping generate outputs (local or missing AWS_BRANCH)"
          fi
    build:
      commands:
        - npm run build
        - test -f dist/amplify_outputs.json || cp public/amplify_outputs.json dist/amplify_outputs.json 2>/dev/null || true
  artifacts:
    baseDirectory: dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
  customHeaders:
    - pattern: "**/*"
      headers:
        - key: Cache-Control
          value: public, max-age=0, must-revalidate
  redirects:
    - source: "/<*>"
      target: "/index.html"
      status: "200"
